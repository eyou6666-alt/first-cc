<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a1d;
  --bg-card: #232327;
  --text: #e8e4dd;
  --text-secondary: #8a857d;
  --ring-track: #2e2e33;
  --ring-work: #e8915a;
  --ring-break: #8aab7a;
  --btn-bg: #2e2e33;
  --btn-hover: #3a3a40;
  --btn-active: #25252a;
  --btn-text: #e8e4dd;
  --dot-empty: #2e2e33;
  --dot-work: #e8915a;
  --dot-break: #8aab7a;
  --shadow-lg: 0 25px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --glow-work: 0 0 40px rgba(232,145,90,0.15);
  --glow-break: 0 0 40px rgba(138,171,122,0.15);
  --transition-theme: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  --tick-color: rgba(255,255,255,0.06);
  font-size: 16px;
}

[data-theme="light"] {
  --bg: #f3efe9;
  --bg-card: #ffffff;
  --text: #2d2923;
  --text-secondary: #9a958d;
  --ring-track: #e8e4dd;
  --ring-work: #d4783b;
  --ring-break: #6d9460;
  --btn-bg: #f0ece4;
  --btn-hover: #e8e4dd;
  --btn-active: #e0dcd4;
  --btn-text: #2d2923;
  --dot-empty: #e8e4dd;
  --dot-work: #d4783b;
  --dot-break: #6d9460;
  --shadow-lg: 0 25px 80px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --glow-work: 0 0 40px rgba(212,120,59,0.12);
  --glow-break: 0 0 40px rgba(109,148,96,0.12);
  --tick-color: rgba(0,0,0,0.05);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Mono', 'SF Mono', 'Menlo', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition-theme), color var(--transition-theme);
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 40%, var(--bg-card) 0%, var(--bg) 70%);
  pointer-events: none;
  transition: background var(--transition-theme);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
}

/* ---- Theme Toggle ---- */
.theme-toggle {
  position: fixed;
  top: 28px;
  right: 28px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--ring-track);
  background: var(--btn-bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-theme);
  z-index: 10;
  color: var(--text-secondary);
}
.theme-toggle:hover {
  border-color: var(--text-secondary);
  color: var(--text);
}
.theme-toggle svg {
  width: 20px;
  height: 20px;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.theme-toggle:hover svg { transform: rotate(30deg); }

/* ---- Timer Section ---- */
.timer-wrapper {
  position: relative;
  width: 320px;
  height: 320px;
  transition: filter var(--transition-theme);
}

.timer-glow {
  position: absolute;
  inset: -30px;
  border-radius: 50%;
  transition: all 0.8s ease;
  pointer-events: none;
}
.timer-glow.work { box-shadow: var(--glow-work); }
.timer-glow.break { box-shadow: var(--glow-break); }

.timer-svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
}

.ring-track {
  fill: none;
  stroke: var(--ring-track);
  stroke-width: 5;
  transition: stroke var(--transition-theme);
}

.ring-progress {
  fill: none;
  stroke: var(--ring-work);
  stroke-width: 5;
  stroke-linecap: round;
  transition: stroke var(--transition-theme), stroke-dashoffset 0.3s linear;
}

.ring-progress.break-mode {
  stroke: var(--ring-break);
}

.tick-mark {
  stroke: var(--tick-color);
  stroke-width: 1.5;
  stroke-linecap: round;
  transition: stroke var(--transition-theme);
}

/* ---- Center Display ---- */
.timer-display {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.timer-time {
  font-family: 'DM Mono', 'SF Mono', 'Menlo', monospace;
  font-size: 4.5rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--text);
  transition: color var(--transition-theme);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.timer-colon {
  display: inline-block;
  transition: opacity 0.2s;
}
.timer-colon.dim { opacity: 0.3; }

.timer-label {
  font-family: 'Noto Serif SC', 'STSong', 'Songti SC', serif;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-top: 8px;
  letter-spacing: 0.08em;
  transition: color var(--transition-theme);
}

/* ---- Session Dots ---- */
.session-dots {
  display: flex;
  gap: 14px;
  align-items: center;
}

.session-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--dot-empty);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.session-dot.filled {
  background: var(--dot-work);
  box-shadow: 0 0 8px var(--dot-work);
}
.session-dot.filled.break-session {
  background: var(--dot-break);
  box-shadow: 0 0 8px var(--dot-break);
}
.session-dot.current {
  transform: scale(1.5);
  box-shadow: 0 0 12px var(--dot-work);
}

/* ---- Controls ---- */
.controls {
  display: flex;
  gap: 16px;
  align-items: center;
}

.btn {
  font-family: 'DM Mono', 'SF Mono', 'Menlo', monospace;
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  padding: 12px 32px;
  border-radius: 50px;
  border: 1px solid var(--ring-track);
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
  transition: all 0.2s ease;
  outline: none;
  position: relative;
  overflow: hidden;
}
.btn:hover {
  background: var(--btn-hover);
  border-color: var(--text-secondary);
}
.btn:active {
  background: var(--btn-active);
  transform: scale(0.97);
}
.btn:focus-visible {
  box-shadow: 0 0 0 2px var(--ring-work);
  border-color: var(--ring-work);
}

.btn-primary {
  min-width: 120px;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.06em;
}
.btn-primary.running {
  border-color: var(--ring-work);
  color: var(--ring-work);
}
.btn-primary.running:hover {
  background: rgba(232,145,90,0.1);
}

.btn-reset {
  width: 44px;
  height: 44px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.btn-reset svg {
  width: 18px;
  height: 18px;
  transition: transform 0.3s ease;
}
.btn-reset:hover svg {
  transform: rotate(-90deg);
}

/* ---- Mode label animation ---- */
@keyframes pulse-ring {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.8; }
}

.timer-wrapper.running .timer-glow {
  animation: pulse-ring 3s ease-in-out infinite;
}

/* ---- Completion overlay ---- */
.completion-flash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.15s ease;
}
.completion-flash.active {
  opacity: 1;
  transition: opacity 0s;
}

/* ---- Responsive ---- */
@media (max-width: 480px) {
  .timer-wrapper {
    width: 260px;
    height: 260px;
  }
  .timer-time {
    font-size: 3.5rem;
  }
  .timer-label {
    font-size: 0.8rem;
  }
  .controls {
    gap: 12px;
  }
  .btn {
    padding: 10px 24px;
    font-size: 0.8rem;
  }
  .session-dots { gap: 10px; }
  .session-dot { width: 8px; height: 8px; }
  .theme-toggle { top: 16px; right: 16px; }
}

@media (max-width: 360px) {
  .timer-wrapper {
    width: 220px;
    height: 220px;
  }
  .timer-time { font-size: 2.8rem; }
}

/* ---- Keyboard hint ---- */
.kbd-hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: var(--text-secondary);
  letter-spacing: 0.06em;
  opacity: 0.5;
  transition: opacity 0.3s, color var(--transition-theme);
}
.kbd-hint:hover { opacity: 0.9; }
.kbd-hint kbd {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid var(--ring-track);
  background: var(--btn-bg);
  font-family: inherit;
  font-size: 0.65rem;
  margin: 0 2px;
}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换深色/浅色主题">
  <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div class="container">
  <div class="timer-wrapper" id="timerWrapper">
    <div class="timer-glow work" id="timerGlow"></div>
    <svg class="timer-svg" viewBox="0 0 320 320" id="timerSvg">
      <defs>
        <filter id="ring-shadow">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
        </filter>
      </defs>
      <!-- Tick marks inserted by JS -->
      <g id="ticksGroup"></g>
      <!-- Track ring -->
      <circle class="ring-track" cx="160" cy="160" r="130"/>
      <!-- Progress ring -->
      <circle class="ring-progress" id="ringProgress"
              cx="160" cy="160" r="130"
              stroke-dasharray="816.81"
              stroke-dashoffset="0"/>
    </svg>
    <div class="timer-display">
      <div class="timer-time" id="timerTime">
        <span id="minutes">25</span><span class="timer-colon" id="colon">:</span><span id="seconds">00</span>
      </div>
      <div class="timer-label" id="timerLabel">专注</div>
    </div>
  </div>

  <div class="session-dots" id="sessionDots">
    <div class="session-dot"></div>
    <div class="session-dot"></div>
    <div class="session-dot"></div>
    <div class="session-dot"></div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="btnStart">开始</button>
    <button class="btn btn-reset" id="btnReset" aria-label="重置" title="重置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M21 20v-5a8 8 0 0 0-10.33-7.73L1 10"/>
      </svg>
    </button>
  </div>
</div>

<div class="completion-flash" id="completionFlash"></div>

<div class="kbd-hint">
  按 <kbd>空格</kbd> 开始/暂停 &nbsp;·&nbsp; 按 <kbd>R</kbd> 重置
</div>

<script>
(function() {
  // ── Constants ──────────────────────────────
  const DURATIONS = {
    work: 25 * 60,
    shortBreak: 5 * 60,
    longBreak: 15 * 60,
  };

  const MODE = { WORK: 'work', SHORT_BREAK: 'shortBreak', LONG_BREAK: 'longBreak' };
  const STATE = { IDLE: 'idle', RUNNING: 'running', PAUSED: 'paused' };

  const POMODOROS_PER_LONG_BREAK = 4;
  const CIRCUMFERENCE = 2 * Math.PI * 130; // r=130
  const TICK_COUNT = 60;
  const UPDATE_INTERVAL = 200; // ms — smooth ring animation

  // ── DOM refs ──────────────────────────────
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const timerWrapper = $('#timerWrapper');
  const timerGlow = $('#timerGlow');
  const ringProgress = $('#ringProgress');
  const elMinutes = $('#minutes');
  const elSeconds = $('#seconds');
  const elColon = $('#colon');
  const elLabel = $('#timerLabel');
  const btnStart = $('#btnStart');
  const btnReset = $('#btnReset');
  const sessionDots = $('#sessionDots');
  const completionFlash = $('#completionFlash');
  const themeToggle = $('#themeToggle');
  const sunIcon = $('#sunIcon');
  const moonIcon = $('#moonIcon');
  const ticksGroup = $('#ticksGroup');

  // ── State ──────────────────────────────────
  let state = STATE.IDLE;
  let mode = MODE.WORK;
  let pomodoros = 0;        // 0..3 completed this cycle
  let remainingMs = DURATIONS.work * 1000;
  let totalMs = DURATIONS.work * 1000;
  let timerHandle = null;
  let lastTick = 0;
  let audioCtx = null;

  // ── Generate tick marks ────────────────────
  function createTicks() {
    let html = '';
    for (let i = 0; i < TICK_COUNT; i++) {
      const angle = (i * 6 - 90) * Math.PI / 180;
      const isHour = i % 5 === 0;
      const inner = isHour ? 118 : 122;
      const outer = isHour ? 128 : 127;
      const x1 = 160 + inner * Math.cos(angle);
      const y1 = 160 + inner * Math.sin(angle);
      const x2 = 160 + outer * Math.cos(angle);
      const y2 = 160 + outer * Math.sin(angle);
      html += `<line class="tick-mark" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
    }
    ticksGroup.innerHTML = html;
  }

  // ── Audio ──────────────────────────────────
  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playNote(freq, startTime, duration, type = 'sine', volume = 0.25) {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

  function playCompletionChime() {
    try {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      // Warm bell-like chime: fundamental + octave harmonic
      const notes = mode === MODE.WORK
        ? [523.25, 659.25, 783.99, 1046.50]  // C5 E5 G5 C6
        : [392.00, 523.25];                    // G4 C5

      notes.forEach((freq, i) => {
        const t = now + i * 0.22;
        playNote(freq, t, 0.6, 'sine', 0.22);
        playNote(freq * 2, t, 0.45, 'sine', 0.06); // octave harmonic
      });
    } catch (_) { /* audio not available */ }
  }

  function playStartSound() {
    try {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      playNote(660, now, 0.15, 'sine', 0.12);
    } catch (_) {}
  }

  // ── UI Updates ─────────────────────────────
  function formatTime(ms) {
    const totalSec = Math.max(0, Math.ceil(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return {
      minutes: String(m).padStart(2, '0'),
      seconds: String(s).padStart(2, '0'),
    };
  }

  function updateTimeDisplay() {
    const t = formatTime(remainingMs);
    elMinutes.textContent = t.minutes;
    elSeconds.textContent = t.seconds;

    // Blinking colon when running
    if (state === STATE.RUNNING) {
      elColon.classList.toggle('dim', Date.now() % 1000 < 500);
    } else {
      elColon.classList.remove('dim');
    }

    // Title bar
    const labelText = mode === MODE.WORK ? '专注' : '休息';
    document.title = `${t.minutes}:${t.seconds} - ${labelText}`;
  }

  function updateRing() {
    const progress = totalMs > 0 ? remainingMs / totalMs : 0;
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  }

  function updateModeUI() {
    const isBreak = mode === MODE.SHORT_BREAK || mode === MODE.LONG_BREAK;

    ringProgress.classList.toggle('break-mode', isBreak);
    timerGlow.classList.toggle('work', !isBreak);
    timerGlow.classList.toggle('break', isBreak);

    if (mode === MODE.WORK) {
      elLabel.textContent = '专注';
    } else if (mode === MODE.SHORT_BREAK) {
      elLabel.textContent = '短休息';
    } else {
      elLabel.textContent = '长休息';
    }
  }

  function updateSessionDots() {
    const dots = sessionDots.querySelectorAll('.session-dot');
    const isBreak = mode === MODE.SHORT_BREAK || mode === MODE.LONG_BREAK;

    dots.forEach((dot, i) => {
      dot.classList.remove('filled', 'break-session', 'current');
      if (i < pomodoros) {
        dot.classList.add('filled');
        if (isBreak) dot.classList.add('break-session');
      }
    });

    // Highlight current session dot (the one being worked on)
    if (mode === MODE.WORK && pomodoros < POMODOROS_PER_LONG_BREAK) {
      dots[pomodoros].classList.add('current');
    }
  }

  function updateButtonUI() {
    if (state === STATE.RUNNING) {
      btnStart.textContent = '暂停';
      btnStart.classList.add('running');
    } else if (state === STATE.PAUSED) {
      btnStart.textContent = '继续';
      btnStart.classList.remove('running');
    } else {
      btnStart.textContent = '开始';
      btnStart.classList.remove('running');
    }
  }

  function updateWrapperAnimation() {
    timerWrapper.classList.toggle('running', state === STATE.RUNNING);
  }

  function refreshAllUI() {
    updateTimeDisplay();
    updateRing();
    updateModeUI();
    updateSessionDots();
    updateButtonUI();
    updateWrapperAnimation();
  }

  // ── Timer logic ────────────────────────────
  function setMode(newMode) {
    mode = newMode;
    totalMs = DURATIONS[mode] * 1000;
    remainingMs = totalMs;

    // Snappy ring reset
    ringProgress.style.transition = 'none';
    ringProgress.style.strokeDashoffset = '0';
    // Force reflow
    ringProgress.offsetHeight;
    ringProgress.style.transition = '';

    updateModeUI();
    updateSessionDots();
    updateTimeDisplay();
  }

  function startTimer() {
    if (state === STATE.RUNNING) return;

    // Create audio context on user gesture
    if (!audioCtx) {
      getAudioContext();
    }

    state = STATE.RUNNING;
    lastTick = Date.now();
    playStartSound();
    updateButtonUI();
    updateWrapperAnimation();

    timerHandle = setInterval(() => {
      const now = Date.now();
      const elapsed = now - lastTick;
      lastTick = now;

      remainingMs -= elapsed;

      if (remainingMs <= 0) {
        remainingMs = 0;
        updateRing();
        updateTimeDisplay();
        completeSession();
        return;
      }

      updateRing();
      updateTimeDisplay();
    }, UPDATE_INTERVAL);
  }

  function pauseTimer() {
    if (state !== STATE.RUNNING) return;
    state = STATE.PAUSED;
    clearInterval(timerHandle);
    timerHandle = null;
    updateButtonUI();
    updateWrapperAnimation();
    updateTimeDisplay();
  }

  function resetTimer() {
    clearInterval(timerHandle);
    timerHandle = null;
    state = STATE.IDLE;
    mode = MODE.WORK;
    pomodoros = 0;
    remainingMs = DURATIONS.work * 1000;
    totalMs = DURATIONS.work * 1000;
    document.title = '番茄钟';
    refreshAllUI();
  }

  function completeSession() {
    clearInterval(timerHandle);
    timerHandle = null;
    state = STATE.IDLE;

    playCompletionChime();
    flashScreen();

    if (mode === MODE.WORK) {
      pomodoros++;
      if (pomodoros >= POMODOROS_PER_LONG_BREAK) {
        pomodoros = 0;
        setMode(MODE.LONG_BREAK);
      } else {
        setMode(MODE.SHORT_BREAK);
      }
    } else {
      // Break complete — back to work
      setMode(MODE.WORK);
    }

    updateButtonUI();
    updateWrapperAnimation();
    updateSessionDots();
  }

  function flashScreen() {
    const color = mode === MODE.WORK
      ? 'rgba(232,145,90,0.08)'
      : 'rgba(138,171,122,0.08)';

    completionFlash.style.background = color;
    completionFlash.classList.add('active');
    requestAnimationFrame(() => {
      completionFlash.classList.remove('active');
    });
  }

  function toggleTimer() {
    if (state === STATE.RUNNING) {
      pauseTimer();
    } else {
      startTimer();
    }
  }

  // ── Theme ──────────────────────────────────
  function getTheme() {
    return document.documentElement.getAttribute('data-theme');
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    sunIcon.style.display = theme === 'dark' ? '' : 'none';
    moonIcon.style.display = theme === 'dark' ? 'none' : '';
    try { localStorage.setItem('pomodoro-theme', theme); } catch (_) {}
  }

  function toggleTheme() {
    setTheme(getTheme() === 'dark' ? 'light' : 'dark');
  }

  function initTheme() {
    let saved;
    try { saved = localStorage.getItem('pomodoro-theme'); } catch (_) {}
    if (saved === 'light' || saved === 'dark') {
      setTheme(saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      setTheme('light');
    } else {
      setTheme('dark');
    }
  }

  // ── Event listeners ────────────────────────
  btnStart.addEventListener('click', toggleTimer);
  btnReset.addEventListener('click', resetTimer);
  themeToggle.addEventListener('click', toggleTheme);

  document.addEventListener('keydown', (e) => {
    // Ignore if user is typing in an input
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.code === 'Space') {
      e.preventDefault();
      toggleTimer();
    } else if (e.code === 'KeyR') {
      e.preventDefault();
      resetTimer();
    }
  });

  // Listen for system theme changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
    // Only auto-switch if user hasn't explicitly set a preference
    let saved;
    try { saved = localStorage.getItem('pomodoro-theme'); } catch (_) {}
    if (!saved) {
      setTheme(e.matches ? 'dark' : 'light');
    }
  });

  // ── Initialization ─────────────────────────
  createTicks();
  initTheme();
  refreshAllUI();
})();
</script>
</body>
</html>
